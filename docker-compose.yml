version: '3.9'
services:
  db:
    image: postgres:latest
    container_name: postgres_container
    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: maxim
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Проброс порта внутри контейнера на хост
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata  # Монтирование локального каталога для сохранения данных
